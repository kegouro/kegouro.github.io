<!doctype html><html lang="es"><head><meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;}
  .og{width:1200px;height:630px;position:relative;overflow:hidden;background:#0a0908;
    font-family:'IBM Plex Mono',monospace;color:#efe7d8;
    display:flex;flex-direction:column;align-items:center;justify-content:center;box-sizing:border-box;}
  .og::before{content:"";position:absolute;left:50%;top:-30%;width:120%;height:120%;transform:translateX(-50%);
    background:radial-gradient(45% 55% at 50% 0%, rgba(245,167,44,0.16), transparent 70%);}
  .mark{width:128px;height:128px;margin-bottom:28px;filter:drop-shadow(0 0 30px rgba(245,167,44,0.45));position:relative;z-index:1;}
  .word{font-family:'Fraunces',serif;font-weight:500;font-size:104px;letter-spacing:0.18em;line-height:0.9;margin:0;position:relative;z-index:1;}
  .word .o{font-style:italic;color:#f5a72c;}
  .sub{margin-top:24px;font-size:22px;letter-spacing:0.06em;color:#9a8a76;position:relative;z-index:1;}
  .by{position:absolute;bottom:40px;font-size:18px;letter-spacing:0.1em;color:#9a8a76;z-index:1;}
  .by b{color:#ff7a3c;font-weight:500;}
</style></head>
<body>
<div class="og">
  <img class="mark" src="pharos.svg" alt="">
  <div class="word">PHAR<span class="o">O</span>S</div>
  <div class="sub">infraestructura científica y educativa · sin barreras de entrada</div>
  <div class="by">github.com/kegouro · Pharos Project · <b>By JLB</b></div>
</div>
</body></html>
